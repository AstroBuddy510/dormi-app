kind = "web"
previewPath = "/"
title = "GrocerEase Accra"
version = "1.0.0"
id = "artifacts/grocery-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20428
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/grocery-app run dev"

[services.env]
PORT = "20428"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/grocery-app", "run", "build"]
publicDir = "artifacts/grocery-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
